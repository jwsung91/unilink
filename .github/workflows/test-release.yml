name: Test Release

on:
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Test name'
        required: true
        default: 'test-release'

jobs:
  test-release:
    name: Test Release Process (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            triplet: x64-linux
            cpack_generator: TGZ
          - os: ubuntu-24.04-arm
            triplet: arm64-linux
            cpack_generator: TGZ
          - os: macos-15
            triplet: arm64-osx
            cpack_generator: "TGZ"
          - os: windows-2022
            triplet: x64-windows
            cpack_generator: ZIP

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up C++ toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y build-essential cmake ninja-build
          echo "CC=gcc" >> "$GITHUB_ENV"
          echo "CXX=g++" >> "$GITHUB_ENV"

      - name: Set up C++ toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install dependencies with vcpkg (Unix)
        if: runner.os != 'Windows'
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: ${{ matrix.triplet }}

      - name: Set up C++ toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          & "C:\vcpkg\vcpkg.exe" install boost-asio:x64-windows boost-system:x64-windows spdlog:x64-windows

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DUNILINK_ENABLE_INSTALL=ON \
            -DUNILINK_ENABLE_PKGCONFIG=ON \
            -DUNILINK_ENABLE_EXPORT_HEADER=ON \
            -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
            -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          SDK_VER=$(xcrun --sdk macosx --show-sdk-version)
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$SDK_VER" \
            -DUNILINK_ENABLE_INSTALL=ON \
            -DUNILINK_ENABLE_PKGCONFIG=ON \
            -DUNILINK_ENABLE_EXPORT_HEADER=ON \
            -DCMAKE_TOOLCHAIN_FILE="${CMAKE_TOOLCHAIN_FILE}" \
            -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DUNILINK_ENABLE_INSTALL=ON `
            -DUNILINK_ENABLE_PKGCONFIG=ON `
            -DUNILINK_ENABLE_EXPORT_HEADER=ON `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure -C Release -LE docs_snippets

      - name: Package
        shell: bash
        run: |
          cd build
          cpack -B package -G "${{ matrix.cpack_generator }}"
          ls -la package/

      - name: Show package contents (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build/package
          tar -tzf unilink-*.tar.gz | head -20

      - name: Summary
        shell: bash
        run: |
          echo "## Test Release Summary - ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build: Success" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Package: Created" >> $GITHUB_STEP_SUMMARY
          ls -la build/package/ >> $GITHUB_STEP_SUMMARY
