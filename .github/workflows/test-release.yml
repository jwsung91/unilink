name: Test Release

on:
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Test name'
        required: true
        default: 'test-release'
      branch:
        description: 'Branch to run on'
        required: true
        default: 'fix/release'

jobs:
  test-release:
    name: Test Release Process (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-24.04]
        include:
          - os: ubuntu-20.04
            triplet: x64-linux
          - os: ubuntu-22.04
            triplet: x64-linux
          - os: ubuntu-24.04
            triplet: x64-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up C++ toolchain
        run: |
          # Remove problematic Microsoft repository to avoid 421 Misdirected Request error
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y build-essential cmake ninja-build software-properties-common wget
          sudo wget -O /etc/apt/trusted.gpg.d/ubuntu-toolchain-r.gpg "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x1E9377A2BA9EF27F" || true
          echo "deb http://ppa.launchpad.net/ubuntu-toolchain-r/test/ubuntu $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/ubuntu-toolchain-r-test.list
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y gcc-13 g++-13

      - name: Install dependencies with vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: ${{ matrix.triplet }}

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_CXX_STANDARD=20 \
            -DUNILINK_ENABLE_INSTALL=ON \
            -DUNILINK_ENABLE_PKGCONFIG=ON \
            -DUNILINK_ENABLE_EXPORT_HEADER=ON \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.CMAKE_TOOLCHAIN_FILE }} \
            -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TARGET_TRIPLET }}

      - name: Build
        run: cmake --build build --config Release -- -v

      - name: Test
        run: cmake --build build --target test

      - name: Package
        run: |
          cd build
          cpack -B package -G TGZ
          ls -la package/

      - name: Show package contents
        run: |
          cd build/package
          tar -tzf unilink-*.tar.gz | head -20

      - name: Test package extraction
        run: |
          cd build/package
          mkdir -p test_extract
          tar -xzf unilink-*.tar.gz -C test_extract
          ls -la test_extract/

      - name: Summary
        run: |
          echo "## Test Release Summary - ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build: Success" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Package: Created" >> $GITHUB_STEP_SUMMARY
          echo "🔧 Dependencies: vcpkg (${{ matrix.triplet }}), Boost 1.84+" >> $GITHUB_STEP_SUMMARY
          echo "📦 Package files:" >> $GITHUB_STEP_SUMMARY
          ls -la build/package/ >> $GITHUB_STEP_SUMMARY
