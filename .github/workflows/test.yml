name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  workflow_call:

env:
  BUILD_TYPE: Debug
  CXX_STANDARD: 20

jobs:
  # Unit and Integration Tests
  unit-tests:
    name: Unit Tests (${{ matrix.os }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: []
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 24.04: GCC 13 and Clang 18
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            triplet: x64-linux
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            triplet: x64-linux
          - os: ubuntu-24.04-arm
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            triplet: arm64-linux
          # macOS: Clang with libc++ std::format support
          - os: macos-26
            compiler: clang
            cc: clang
            cxx: clang++
            triplet: arm64-osx

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Compute CMakeLists hash
      id: cmake-hash
      run: |
        FILES=$(git ls-files '**/CMakeLists.txt')
        if [ -z "$FILES" ]; then
          echo "hash=none" >> "$GITHUB_OUTPUT"
        else
          HASH=$(printf '%s\n' "$FILES" | LC_ALL=C sort | xargs shasum | shasum | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ steps.cmake-hash.outputs.hash }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ steps.cmake-hash.outputs.hash }}-
          ccache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.compiler }}-

    - name: Install compiler and tools (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates

        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          sudo apt-get install -y gcc-13 g++-13
        else
          sudo apt-get install -y ${{ matrix.cc }} g++-13
        fi

        # Install other tools. Boost and spdlog are supplied by vcpkg.
        sudo apt-get install -y ninja-build

    - name: Install tools (macOS)
      if: runner.os == 'macOS'
      run: brew install ccache ninja

    - name: Set up compiler env
      run: |
        echo "CC=$(which ${{ matrix.cc }})" >> $GITHUB_ENV
        echo "CXX=$(which ${{ matrix.cxx }})" >> $GITHUB_ENV

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: ${{ matrix.triplet }}

    - name: Configure CMake
      run: |
        cmake -S . -B build-test \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DUNILINK_BUILD_EXAMPLES=OFF \
          -DUNILINK_BUILD_DOCS=OFF \
          -DUNILINK_BUILD_TESTS=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build tests
      run: cmake --build build-test -j ${CORE_COUNT:-4}

    - name: Run unit tests
      run: |
        cd build-test
        ctest --output-on-failure --parallel ${CORE_COUNT:-2} \
          --label-regex "unit|core|memory|config" || \
        ctest --rerun-failed --output-on-failure --parallel ${CORE_COUNT:-2}

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: unit-test-results-${{ matrix.os }}-${{ matrix.compiler }}
        path: build-test/Testing/
        retention-days: 7
        overwrite: true

  docs-snippets:
    name: Docs Snippets (ubuntu-24.04, gcc)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: []

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-docs-snippets-${{ hashFiles('**/CMakeLists.txt', 'docs/**/*.md', 'docs/scripts/*.py') }}
        restore-keys: |
          ccache-${{ runner.os }}-docs-snippets-

    - name: Install dependencies
      uses: ./.github/actions/apt-install
      with:
        packages: "build-essential cmake ccache gcc-13 g++-13 python3"

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: x64-linux

    - name: Configure CMake
      run: |
        cmake -S . -B build-docs-snippets \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DUNILINK_BUILD_EXAMPLES=OFF \
          -DUNILINK_BUILD_DOCS=OFF \
          -DUNILINK_BUILD_TESTS=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build doc snippet smoke target
      run: cmake --build build-docs-snippets --target doc_snippets_smoke -j $(nproc)

    - name: Run doc snippet tests
      run: |
        cd build-docs-snippets
        ctest --output-on-failure -L docs_snippets

    - name: Upload docs snippet test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: docs-snippet-test-results
        path: build-docs-snippets/Testing/
        retention-days: 7
        overwrite: true

  # Integration Tests
  integration-tests:
    name: Integration Tests (ubuntu-24.04, gcc)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: []

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-integration-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ccache-${{ runner.os }}-integration-

    - name: Install dependencies
      uses: ./.github/actions/apt-install
      with:
        packages: "build-essential cmake ccache gcc-13 g++-13"

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: x64-linux

    - name: Configure CMake
      run: |
        cmake -S . -B build-integration \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DUNILINK_BUILD_EXAMPLES=OFF \
          -DUNILINK_BUILD_DOCS=OFF \
          -DUNILINK_BUILD_TESTS=ON \
          -DUNILINK_ENABLE_PERFORMANCE_TESTS=OFF \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build integration tests
      run: cmake --build build-integration -j $(nproc)

    - name: Run integration tests
      run: |
        cd build-integration
        ctest --output-on-failure --parallel 2 \
          --label-regex "integration|mock|stable" \
          --label-exclude "slow" || \
        ctest --rerun-failed --output-on-failure --parallel 2 \
          --label-regex "integration|mock|stable" \
          --label-exclude "slow"

    - name: Upload integration test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: integration-test-results
        path: build-integration/Testing/
        retention-days: 7
        overwrite: true

  integration-tests-arm64:
    name: Integration Tests (ubuntu-24.04-arm, gcc)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    needs: []

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-integration-arm64-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ccache-${{ runner.os }}-integration-arm64-

    - name: Install dependencies
      uses: ./.github/actions/apt-install
      with:
        packages: "build-essential cmake ccache gcc-13 g++-13 socat"

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: arm64-linux

    - name: Configure CMake
      run: |
        cmake -S . -B build-integration-arm64 \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DUNILINK_BUILD_EXAMPLES=OFF \
          -DUNILINK_BUILD_DOCS=OFF \
          -DUNILINK_BUILD_TESTS=ON \
          -DUNILINK_ENABLE_PERFORMANCE_TESTS=OFF \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build integration tests
      run: cmake --build build-integration-arm64 -j $(nproc)

    - name: Run integration tests
      run: |
        cd build-integration-arm64
        ctest --output-on-failure --parallel 2 \
          --label-regex "integration|mock|stable" \
          --label-exclude "slow" || \
        ctest --rerun-failed --output-on-failure --parallel 2 \
          --label-regex "integration|mock|stable" \
          --label-exclude "slow"

    - name: Upload integration test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: integration-test-results-ubuntu-24.04-arm-gcc
        path: build-integration-arm64/Testing/
        retention-days: 7
        overwrite: true

  # Performance Tests
  performance-tests:
    name: Performance Tests (ubuntu-24.04, gcc)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: []
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-performance-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ccache-${{ runner.os }}-performance-

    - name: Install dependencies
      uses: ./.github/actions/apt-install
      with:
        packages: "build-essential cmake ccache gcc-13 g++-13"

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: x64-linux

    - name: Configure CMake
      run: |
        cmake -S . -B build-perf \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DUNILINK_BUILD_EXAMPLES=OFF \
          -DUNILINK_BUILD_DOCS=OFF \
          -DUNILINK_BUILD_TESTS=ON \
          -DUNILINK_ENABLE_PERFORMANCE_TESTS=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build performance tests
      run: cmake --build build-perf -j $(nproc)

    - name: Run performance tests
      run: |
        cd build-perf
        ctest --output-on-failure --parallel 2 \
          --label-regex "performance|benchmark|stress"

    - name: Upload performance test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: performance-test-results
        path: build-perf/Testing/
        retention-days: 7
        overwrite: true

  # Memory Safety Tests
  memory-safety-tests:
    name: Memory Safety Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: []
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      uses: ./.github/actions/apt-install
      with:
        packages: "build-essential cmake gcc-13 g++-13"

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: x64-linux

    - name: Configure CMake with Sanitizers
      run: |
        cmake -S . -B build-sanitizer \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DUNILINK_ENABLE_SANITIZERS=ON \
          -DUNILINK_ENABLE_MEMORY_TRACKING=ON \
          -DUNILINK_BUILD_TESTS=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined,leak -fno-omit-frame-pointer -g" \
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined,leak -fno-omit-frame-pointer -g" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined,leak" \
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined,leak"

    - name: Build with sanitizers
      run: cmake --build build-sanitizer -j $(nproc)

    - name: Run memory safety tests
      run: |
        cd build-sanitizer
        ctest --output-on-failure --parallel $(nproc) \
          --label-regex "memory|safety"

    - name: Upload memory safety test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: memory-safety-test-results
        path: build-sanitizer/Testing/
        retention-days: 7
        overwrite: true

  # E2E Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-24.04
    needs: []
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/apt-install
        with:
          packages: "build-essential cmake gcc-13 g++-13"
      - name: Install dependencies with vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: x64-linux
      - name: Configure
        run: |
          cmake -S . -B build-e2e \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
            -DUNILINK_ENABLE_CONFIG=ON \
            -DUNILINK_BUILD_TESTS=ON \
            -DUNILINK_BUILD_EXAMPLES=OFF \
            -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
            -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET
      - name: Build
        run: cmake --build build-e2e -j $(nproc)
      - name: Run E2E Tests
        run: |
          cd build-e2e
          ctest -L e2e --output-on-failure --parallel 2 || \
          ctest -L e2e --rerun-failed --output-on-failure --parallel 2
      - name: Upload E2E test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-test-results
          path: build-e2e/Testing/
          retention-days: 7
          overwrite: true

  # Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04
    needs: [unit-tests, docs-snippets, integration-tests, performance-tests, memory-safety-tests, e2e-tests]
    if: always()

    steps:
    - name: Test Summary
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docs Snippets | ${{ needs.docs-snippets.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Tests | ${{ needs.performance-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Memory Safety Tests | ${{ needs.memory-safety-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅ Passed' || needs.e2e-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
