name: CI - install & consume

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-test-install-consume:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v6

      - name: Set up C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y gcc-13 g++-13
            sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
            sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          else
            sudo apt-get install -y clang-15 g++-13
            # Clang often needs to be told which libstdc++ to use if default is old
            export CXXFLAGS="-stdlib=libstdc++"
          fi
          
          sudo apt-get install -y build-essential cmake ninja-build libboost-all-dev libspdlog-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNILINK_ENABLE_INSTALL=ON \
            -DUNILINK_ENABLE_PKGCONFIG=ON \
            -DUNILINK_ENABLE_EXPORT_HEADER=ON

      - name: Build
        run: cmake --build build --config Release -- -v

      - name: Install
        run: sudo cmake --install build

      - name: Consume as package (find_package)
        run: |
          mkdir -p /tmp/consumer && cd /tmp/consumer
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.12)
          project(consumer CXX)
          set(CMAKE_CXX_STANDARD 20)
          find_package(unilink CONFIG REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE unilink::unilink_shared)
          EOF
          cat > main.cpp <<'EOF'
          #include <unilink/unilink.hpp>
          #include <iostream>
          int main(){ 
            std::cout << "unilink package consumed successfully!\n"; 
            return 0; 
          }
          EOF
          cmake -S . -B build -G Ninja
          cmake --build build --config Release
          ./build/consumer

      - name: Test pkg-config
        run: |
          echo "Testing pkg-config integration..."
          pkg-config --cflags --libs unilink
          echo "pkg-config test completed successfully!"
