name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'

# This is a lightweight coordination workflow. Specialized workflows are
# triggered directly by the same events and report their own required checks.
jobs:
  trigger-workflows:
    name: Trigger CI Workflows
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

  # Overall CI Summary
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-22.04
    needs: trigger-workflows
    if: always()

    steps:
    - name: CI Summary
      run: |
        echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Workflow | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Test | See the dedicated Test workflow checks |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | See the dedicated Code Quality workflow checks |" >> $GITHUB_STEP_SUMMARY
        echo "| Security | Runs on main, scheduled, or manual dispatch |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
