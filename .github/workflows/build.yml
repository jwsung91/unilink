name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  workflow_call:

env:
  BUILD_TYPE: Release
  CXX_STANDARD: 20

jobs:
  # Multi-platform Build Matrix (Ubuntu 22.04, 24.04)
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 24.04: GCC 13 and Clang 18
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            triplet: x64-linux
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            triplet: x64-linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        set -e  # Exit on any error
        
        echo "Installing basic dependencies..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          doxygen \
          graphviz

        echo "Installing compiler: ${{ matrix.compiler }} for ${{ matrix.os }}"
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          sudo apt-get install -y gcc-13 g++-13
        else
          sudo apt-get install -y ${{ matrix.cc }} g++-13
        fi
        
        echo "Verifying compiler installation..."
        ${{ matrix.cc }} --version
        ${{ matrix.cxx }} --version

    - name: Set up compiler
      run: |
        echo "CC=$(which ${{ matrix.cc }})" >> $GITHUB_ENV
        echo "CXX=$(which ${{ matrix.cxx }})" >> $GITHUB_ENV

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: ${{ matrix.triplet }}

    - name: Configure CMake (Minimal Build)
      run: |
        set -e
        echo "Configuring minimal build..."
        cmake -S . -B build-minimal \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=OFF \
          -DBUILD_EXAMPLES=ON \
          -DBUILD_TESTING=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

    - name: Configure CMake (Full Build)
      run: |
        set -e
        echo "Configuring full build..."
        cmake -S . -B build-full \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DBUILD_EXAMPLES=ON \
          -DBUILD_TESTING=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

    - name: Build (Minimal)
      run: |
        set -e
        echo "Building minimal version..."
        cmake --build build-minimal -j $(nproc)

    - name: Build (Full)
      run: |
        set -e
        echo "Building full version..."
        cmake --build build-full -j $(nproc)

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: build-artifacts-${{ matrix.os }}-${{ matrix.compiler }}
        path: |
          build-minimal/
          build-full/
        retention-days: 7
        overwrite: true

  # Windows Build (MSVC + vcpkg)
  build-windows:
    name: Build (windows-2022, msvc)
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set CMake path without spaces
      shell: pwsh
      run: |
        echo "CMAKE_EXE=C:/PROGRA~1/CMake/bin/cmake.exe" >> $env:GITHUB_ENV
        echo "CTEST_EXE=C:/PROGRA~1/CMake/bin/ctest.exe" >> $env:GITHUB_ENV

    - name: Clone vcpkg
      run: git clone --depth 1 https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/vcpkg"

    - name: Bootstrap vcpkg
      shell: pwsh
      working-directory: ${{ github.workspace }}/vcpkg
      run: .\bootstrap-vcpkg.bat

    - name: Create Custom Triplet
      shell: pwsh
      run: |
        $tripletPath = Join-Path "${{ github.workspace }}\vcpkg" "triplets/x64-windows-static-md.cmake"
        Set-Content -Path $tripletPath -Value @"
        set(VCPKG_TARGET_ARCHITECTURE x64)
        set(VCPKG_CRT_LINKAGE dynamic)
        set(VCPKG_LIBRARY_LINKAGE static)
        "@

    - name: Install Dependencies (vcpkg)
      shell: pwsh
      env:
        VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        VCPKG_USE_SYSTEM_BINARIES: "1"
      run: |
        $retries = 3
        $count = 0
        $success = $false
        do {
          try {
            & "$env:VCPKG_ROOT\vcpkg.exe" install boost-system boost-asio spdlog --triplet x64-windows-static-md
            if ($LASTEXITCODE -eq 0) {
              $success = $true
            } else {
              throw "vcpkg install failed with exit code $LASTEXITCODE"
            }
          } catch {
            $count++
            if ($count -lt $retries) {
              Write-Host "Command failed. Retrying ($count/$retries) in 10s..."
              Start-Sleep -Seconds 10
            } else {
              Write-Error "Command failed after $retries attempts."
              exit 1
            }
          }
        } until ($success)

    - name: Configure CMake (MSVC + vcpkg)
      shell: pwsh
      env:
        VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        VCPKG_USE_SYSTEM_BINARIES: "1"
      run: |
        & "$env:CMAKE_EXE" -S . -B build-windows `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
          -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }} `
          -DUNILINK_ENABLE_CONFIG=ON `
          -DUNILINK_BUILD_EXAMPLES=OFF `
          -DUNILINK_BUILD_TESTS=ON `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md

    - name: Build (Release)
      shell: pwsh
      run: |
        & "$env:CMAKE_EXE" --build build-windows --config ${{ env.BUILD_TYPE }}

    - name: Build unit tests (Release)
      shell: pwsh
      run: |
        & "$env:CMAKE_EXE" --build build-windows `
          --target unilink_unit_tests `
          --config ${{ env.BUILD_TYPE }}

    - name: Smoke tests (exclude slow/perf)
      shell: pwsh
      run: |
        & "$env:CTEST_EXE" --test-dir build-windows `
          -C ${{ env.BUILD_TYPE }} `
          --output-on-failure `
          --label-exclude "performance|benchmark|stress|slow|serial"

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: build-artifacts-windows-msvc
        path: |
          build-windows/
        retention-days: 7
        overwrite: true
