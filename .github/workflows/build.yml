name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  workflow_call:

env:
  BUILD_TYPE: Release
  CXX_STANDARD: 20

jobs:
  # Multi-platform Build Matrix (Ubuntu 22.04, 24.04)
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 24.04: GCC 13 and Clang 18
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            triplet: x64-linux
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            triplet: x64-linux
          - os: ubuntu-22.04-arm
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            triplet: arm64-linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        set -e  # Exit on any error
        
        echo "Installing basic dependencies..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          doxygen \
          graphviz \
          software-properties-common

        echo "Installing compiler: ${{ matrix.compiler }} for ${{ matrix.os }}"
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          if [[ "${{ matrix.os }}" == "ubuntu-22.04"* ]] && [[ "${{ matrix.cc }}" == "gcc-13" ]]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
            sudo apt-get update
          fi
          sudo apt-get install -y ${{ matrix.cc }} ${{ matrix.cxx }}
        else
          sudo apt-get install -y ${{ matrix.cc }} g++-13
        fi
        
        echo "Verifying compiler installation..."
        ${{ matrix.cc }} --version
        ${{ matrix.cxx }} --version

    - name: Set up compiler
      run: |
        echo "CC=$(which ${{ matrix.cc }})" >> $GITHUB_ENV
        echo "CXX=$(which ${{ matrix.cxx }})" >> $GITHUB_ENV

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: ${{ matrix.triplet }}

    - name: Configure CMake (Minimal Build)
      run: |
        set -e
        echo "Configuring minimal build..."
        cmake -S . -B build-minimal \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=OFF \
          -DBUILD_EXAMPLES=ON \
          -DBUILD_TESTING=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

    - name: Configure CMake (Full Build)
      run: |
        set -e
        echo "Configuring full build..."
        cmake -S . -B build-full \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_CXX_STANDARD=$CXX_STANDARD \
          -DUNILINK_ENABLE_CONFIG=ON \
          -DBUILD_EXAMPLES=ON \
          -DBUILD_TESTING=ON \
          -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
          -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

    - name: Build (Minimal)
      run: |
        set -e
        echo "Building minimal version..."
        cmake --build build-minimal -j $(nproc)

    - name: Build (Full)
      run: |
        set -e
        echo "Building full version..."
        cmake --build build-full -j $(nproc)

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: build-artifacts-${{ matrix.os }}-${{ matrix.compiler }}
        path: |
          build-minimal/
          build-full/
        retention-days: 7
        overwrite: true

  # Windows Build (MSVC + vcpkg)
  build-windows:
    name: Build (windows-2022, msvc)
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up C++ toolchain (Windows)
      shell: pwsh
      run: |
        choco install ninja --no-progress -y
        echo "CMAKE_EXE=C:/PROGRA~1/CMake/bin/cmake.exe" >> $env:GITHUB_ENV
        echo "CTEST_EXE=C:/PROGRA~1/CMake/bin/ctest.exe" >> $env:GITHUB_ENV

    - name: Install dependencies with vcpkg
      uses: ./.github/actions/setup-vcpkg
      with:
        triplet: x64-windows
        packages: boost-system boost-asio spdlog

    - name: Configure CMake (MSVC + vcpkg)
      shell: pwsh
      run: |
        & "$env:CMAKE_EXE" -S . -B build-windows `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
          -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }} `
          -DUNILINK_ENABLE_CONFIG=ON `
          -DUNILINK_BUILD_EXAMPLES=OFF `
          -DUNILINK_BUILD_TESTS=ON `
          -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
          -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

    - name: Build (Release)
      shell: pwsh
      run: |
        & "$env:CMAKE_EXE" --build build-windows --config ${{ env.BUILD_TYPE }}

    - name: Build unit tests (Release)
      shell: pwsh
      run: |
        & "$env:CMAKE_EXE" --build build-windows `
          --target unilink_unit_tests `
          --config ${{ env.BUILD_TYPE }}

    - name: Smoke tests (exclude slow/perf)
      shell: pwsh
      run: |
        & "$env:CTEST_EXE" --test-dir build-windows `
          -C ${{ env.BUILD_TYPE }} `
          --output-on-failure `
          --label-exclude "performance|benchmark|stress|slow|serial"

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: build-artifacts-windows-msvc
        path: |
          build-windows/
        retention-days: 7
        overwrite: true
