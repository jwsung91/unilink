name: CMake

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          # Matrix for Pure C++ (existing configuration)
          - name: C++ (Linux, GCC)
            os: ubuntu-24.04
            triplet: x64-linux
            cc: gcc
            cxx: g++
            generator: Ninja
            build_type: Release
            build_python: OFF
            vcpkg_features: ""
          - name: C++ (Windows, MSVC)
            os: windows-2022
            triplet: x64-windows
            cc: cl
            cxx: cl
            generator: "Visual Studio 17 2022"
            build_type: Release
            build_python: OFF
            vcpkg_features: ""
          - name: C++ (macOS, Clang)
            os: macos-14
            triplet: arm64-osx
            cc: clang
            cxx: clang++
            generator: Ninja
            build_type: Release
            build_python: OFF
            vcpkg_features: ""

          # Matrix for Python Enabled
          - name: Python3 (Linux, GCC)
            os: ubuntu-24.04
            triplet: x64-linux
            cc: gcc
            cxx: g++
            generator: Ninja
            build_type: Release
            build_python: ON
            vcpkg_features: "python"
          - name: Python3 (Windows, MSVC)
            os: windows-2022
            triplet: x64-windows
            cc: cl
            cxx: cl
            generator: "Visual Studio 17 2022"
            build_type: Release
            build_python: ON
            vcpkg_features: "python"
          - name: Python3 (macOS, Clang)
            os: macos-14
            triplet: arm64-osx
            cc: clang
            cxx: clang++
            generator: Ninja
            build_type: Release
            build_python: ON
            vcpkg_features: "python"

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      BUILD_TYPE: ${{ matrix.build_type }}
      VCPKG_USE_SYSTEM_BINARIES: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Export GitHub Actions Cache Environment Variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Build Dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool libtool-bin pkg-config
          else
            brew install ninja autoconf autoconf-archive automake libtool pkg-config boost pybind11
          fi

      - name: Setup Python
        if: matrix.build_python == 'ON'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python Test Dependencies
        if: matrix.build_python == 'ON'
        run: python -m pip install pytest pybind11

      - name: Clone vcpkg
        if: runner.os != 'macOS'
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git "${{ env.VCPKG_ROOT }}"

      - name: Bootstrap vcpkg (Linux)
        if: runner.os == 'Linux'
        run: "${VCPKG_ROOT}/bootstrap-vcpkg.sh"

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${env:VCPKG_ROOT}\bootstrap-vcpkg.bat"

      - name: Install Dependencies (vcpkg)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          # Use Windows-style path for vcpkg executable if on Windows
          if [ "${{ runner.os }}" = "Windows" ]; then
            VCPKG_EXE="${VCPKG_ROOT}/vcpkg.exe"
          else
            VCPKG_EXE="${VCPKG_ROOT}/vcpkg"
          fi

          # Helper function for retrying commands
          retry_command() {
            local retries=3
            local count=0
            until "$@"; do
              exit_code=$?
              count=$((count + 1))
              if [ $count -lt $retries ]; then
                echo "Command failed with exit code $exit_code. Retrying ($count/$retries) in 10s..."
                sleep 10
              else
                echo "Command failed with exit code $exit_code after $retries attempts."
                return $exit_code
              fi
            done
            return 0
          }

          # Install base dependencies
          retry_command "$VCPKG_EXE" install boost-system boost-asio --triplet ${{ matrix.triplet }}

          # Install python bindings dependencies if requested
          if [ "${{ matrix.build_python }}" = "ON" ]; then
            echo "Skipping pybind11 installation via vcpkg to avoid overriding host Python"
          fi

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          PYTHON_CMAKE_ARGS=()
          if [ "${{ matrix.build_python }}" = "ON" ]; then
            PYTHON_CMAKE_ARGS+=("-DPython3_EXECUTABLE=$(python3 -c 'import sys; print(sys.executable)')")
          fi

          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
            -DUNILINK_BUILD_EXAMPLES=OFF \
            -DUNILINK_BUILD_DOCS=OFF \
            -DUNILINK_BUILD_TESTS=ON \
            -DUNILINK_ENABLE_PERFORMANCE_TESTS=OFF \
            -DBUILD_PYTHON_BINDINGS=${{ matrix.build_python }} \
            "${PYTHON_CMAKE_ARGS[@]}"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          PYTHON_CMAKE_ARGS=()
          if [ "${{ matrix.build_python }}" = "ON" ]; then
            PYTHON_CMAKE_ARGS+=("-DPython3_EXECUTABLE=$(python3 -c 'import sys; print(sys.executable)')")
          fi

          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -Dpybind11_DIR="$(brew --prefix pybind11)/share/cmake/pybind11" \
            -DUNILINK_BUILD_EXAMPLES=OFF \
            -DUNILINK_BUILD_DOCS=OFF \
            -DUNILINK_BUILD_TESTS=ON \
            -DUNILINK_ENABLE_PERFORMANCE_TESTS=OFF \
            -DBUILD_PYTHON_BINDINGS=${{ matrix.build_python }} \
            "${PYTHON_CMAKE_ARGS[@]}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pythonCmakeArgs = @()
          if ("${{ matrix.build_python }}" -eq "ON") {
            $pythonExe = python -c "import sys; print(sys.executable)"
            $pythonCmakeArgs += "-DPython3_EXECUTABLE=$pythonExe"
          }

          cmake -S . -B build `
            -G "${{ matrix.generator }}" -A x64 `
            -DCMAKE_BUILD_TYPE="${env:BUILD_TYPE}" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -DUNILINK_BUILD_EXAMPLES=OFF `
            -DUNILINK_BUILD_DOCS=OFF `
            -DUNILINK_BUILD_TESTS=ON `
            -DUNILINK_ENABLE_PERFORMANCE_TESTS=OFF `
            -DBUILD_PYTHON_BINDINGS=${{ matrix.build_python }} `
            @pythonCmakeArgs

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Build unit tests
        if: runner.os == 'Windows'
        run: cmake --build build --target unilink_unit_tests --config "${BUILD_TYPE}"

      - name: Test (Windows, Full C++)
        if: runner.os == 'Windows' && matrix.build_python != 'ON'
        working-directory: build
        shell: pwsh
        run: ctest -C "${env:BUILD_TYPE}" --output-on-failure -LE docs_snippets

      - name: Test (Linux/macOS, Full C++)
        if: runner.os != 'Windows' && matrix.build_python != 'ON'
        working-directory: build
        run: ctest --output-on-failure --parallel 2 -LE docs_snippets

      - name: Test (Windows, Python C++ Smoke)
        if: runner.os == 'Windows' && matrix.build_python == 'ON'
        working-directory: build
        shell: pwsh
        run: |
          # Full C++ coverage already runs in the pure C++ matrix.
          # Python-enabled jobs keep only a fast C++ smoke subset, then verify
          # install/import/pytest on top of that.
          ctest -C "${env:BUILD_TYPE}" --output-on-failure -L "unit_(common_fast|builder_fast|config_fast|transport_fast)|stable"

      - name: Test (Linux/macOS, Python C++ Smoke)
        if: runner.os != 'Windows' && matrix.build_python == 'ON'
        working-directory: build
        run: |
          # Full C++ coverage already runs in the pure C++ matrix.
          # Python-enabled jobs keep only a fast C++ smoke subset, then verify
          # install/import/pytest on top of that.
          ctest --output-on-failure --parallel 2 -L 'unit_(common_fast|builder_fast|config_fast|transport_fast)|stable'

      - name: Stage Python Package (Windows)
        if: matrix.build_python == 'ON' && runner.os == 'Windows'
        shell: pwsh
        run: cmake --install build --prefix build/install --config "${env:BUILD_TYPE}"

      - name: Stage Python Package (Linux/macOS)
        if: matrix.build_python == 'ON' && runner.os != 'Windows'
        shell: bash
        run: cmake --install build --prefix build/install

      - name: Verify Python Import (Windows)
        if: matrix.build_python == 'ON' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $sitePackages = python -c "import sysconfig; p = sysconfig.get_path('platlib', vars={'base':'', 'platbase':''}) or sysconfig.get_path('purelib', vars={'base':'', 'platbase':''}) or ''; print(p.lstrip(r'/\\'))"
          $installPath = Join-Path $pwd "build/install/$sitePackages"
          $packagePath = Join-Path $installPath "unilink"
          $env:PYTHONPATH = "$installPath;$env:PYTHONPATH"
          $env:UNILINK_INSTALL_PATH = $installPath
          $env:UNILINK_PACKAGE_PATH = $packagePath
          python bindings/python/diagnose_windows_import.py
          python bindings/python/test_import.py
          python -m pytest bindings/python/tests -q

      - name: Verify Python Import (Linux/macOS)
        if: matrix.build_python == 'ON' && runner.os != 'Windows'
        shell: bash
        run: |
          PY_SITE=$(python3 -c "import sysconfig; p = sysconfig.get_path('platlib', vars={'base':'', 'platbase':''}) or sysconfig.get_path('purelib', vars={'base':'', 'platbase':''}) or ''; print(p.lstrip('/\\\\'))")
          export PYTHONPATH="$PWD/build/install/$PY_SITE:$PYTHONPATH"
          python3 bindings/python/test_import.py
          python3 -m pytest bindings/python/tests -q
